<svg width="300" height="60" viewBox="0 0 300 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo text -->
  <text x="150" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#logoGradient)" text-anchor="middle" letter-spacing="2">XORA</text>
  
  <!-- Decorative line -->
  <line x1="60" y1="48" x2="240" y2="48" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>

